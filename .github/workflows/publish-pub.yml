name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(awk '$1 == "version:" { print $2; exit }' pubspec.yaml)"
          expected_tag="v${package_version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "error: tag '$GITHUB_REF_NAME' must match package version '$expected_tag'" >&2
            exit 1
          fi

      - name: Setup pinned Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.8
          cache: true

      - name: Resolve dependencies
        run: flutter pub get --no-example

      - name: Verify tracked package source
        run: git diff HEAD --exit-code --

      - name: Dry-run and publish
        shell: bash
        run: |
          set -euo pipefail
          flutter pub publish --dry-run
          flutter pub publish --force
