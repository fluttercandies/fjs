name: Precompile Binaries

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: precompiled-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.32.8
  RUST_TOOLCHAIN: 1.97.1
  RUST_CRATE_DIR: libfjs

jobs:
  publish-darwin-generation:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Reject docs from tracked paths or history
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git ls-files docs)"
          test -z "$(git log --all --oneline -- docs)"

      - name: Select pinned Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version | grep -F 'Xcode 16.4'
          test "$(xcrun --sdk iphoneos --show-sdk-version)" = 18.5
          test "$(xcrun --sdk macosx --show-sdk-version)" = 15.5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup pinned Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Resolve dependencies
        run: dart pub get
        working-directory: cargokit/build_tool

      - name: Build the shared CocoaPods and SwiftPM generation
        run: tool/build_fjs_xcframework.sh --configuration Release

      - name: Publish the completed v2 generation
        run: >-
          dart run cargokit/build_tool/bin/build_tool.dart
          publish-precompiled-generation
          --manifest-dir=${{ env.RUST_CRATE_DIR }}
          --generation-dir=build/darwin-xcframework/generation
          --repository=${{ github.repository }}
          --source-commit=${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRECOMPILE_BINARIES_PRIVATE_KEY }}

      - name: Verify the published v2 generation
        run: >-
          dart run cargokit/build_tool/bin/build_tool.dart
          verify-binaries
          --manifest-dir=${{ env.RUST_CRATE_DIR }}

      - name: Upload SwiftPM delivery artifact
        uses: actions/upload-artifact@v7
        with:
          name: fjs-swiftpm-${{ github.sha }}
          path: darwin/fjs/Binaries/fjs.xcframework.zip
          if-no-files-found: error
          retention-days: 30
